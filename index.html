<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris Video to Tetofu (Beam Search)</title>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
<style>
    :root { --bg: #1a1a2e; --primary: #4b4b7c; --accent: #00a0f0; --text: #e0e0e0; }
    body { background-color: var(--bg); color: var(--text); font-family: monospace, sans-serif; padding: 20px; margin: 0; }
    h1, h2 { border-bottom: 2px solid var(--primary); padding-bottom: 5px; }
    .panel { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--primary); }
    .controls { display: flex; gap: 15px; flex-wrap: wrap; }
    button { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:disabled { background: #555; cursor: not-allowed; }
    input[type="file"], textarea { padding: 8px; background: rgba(0,0,0,0.3); border-radius: 4px; color: #fff; border: 1px solid #555; }
    textarea { width: 100%; height: 60px; font-family: monospace; resize: vertical; }
    #logArea { background: #000; border: 1px solid #555; height: 250px; overflow-y: scroll; padding: 10px; font-size: 12px; white-space: pre-wrap; }
    .info { color: #4db8ff; } .warn { color: #ffcc00; } .error { color: #ff4444; } .success { color: #00ff00; }
    .link-box { display: block; margin-top: 10px; word-break: break-all; color: var(--accent); background: #000; padding: 10px; text-decoration: none; border: 1px dashed #444;}
    canvas, video { display: none; }
</style>
</head>
<body>

<h1>Tetris Video Analyzer (Beam Search)</h1>

<div class="panel">
    <h2>1. 準備</h2>
    <div class="controls">
        <div><label>ONNXモデル: </label><input type="file" id="modelInput" accept=".onnx"></div>
        <div><label>動画: </label><input type="file" id="videoInput" accept="video/*"></div>
    </div>
    <div style="margin-top: 10px;">
        <label>P1 初手盤面 (20行x10列の文字, 空白は _ )</label>
        <textarea id="p1InitBoard" placeholder="空の場合はすべて _ として扱います"></textarea>
        <label>P2 初手盤面</label>
        <textarea id="p2InitBoard" placeholder="空の場合はすべて _ として扱います"></textarea>
    </div>
</div>

<div class="panel">
    <h2>2. 実行</h2>
    <div class="controls">
        <button id="startBtn" disabled>解析開始</button>
    </div>
    <h3>System Log</h3>
    <div id="logArea"></div>
</div>

<div class="panel" id="resultPanel" style="display:none;">
    <h2>3. 結果リンク</h2>
    <a id="linkP1" class="link-box" target="_blank">P1のみリンク生成中...</a>
    <a id="linkP2" class="link-box" target="_blank">P2のみリンク生成中...</a>
    <a id="linkMerged" class="link-box" target="_blank">P1+P2 融合リンク生成中...</a>
</div>

<video id="videoPlayer" muted playsinline></video>
<canvas id="processCanvas"></canvas>

<script>
// ==========================================
// 1. エディタ完全互換の定義と関数群
// ==========================================
const BOARD_WIDTH = 10;
const BOARD_HEIGHT = 40;
const BOARD_VISIBLE_HEIGHT = 20;

const TETROMINOS = {
    'I': { shape: [[0, 0], [1, 0], [2, 0], [3, 0]], center: [1.5, 0.5] },
    'O': { shape: [[0, 0], [1, 0], [0, -1], [1, -1]], center: [0.5, -0.5] },
    'T': { shape: [[0, 0], [-1, 0], [0, -1], [1, 0]], center: [0, 0] },
    'L': { shape: [[-1, 0], [0, 0], [1, 0], [1, -1]], center: [0, 0] },
    'J': { shape: [[0, 0], [-1, 0], [1, 0], [-1, -1]], center: [0, 0] },
    'S': { shape: [[1, -1], [-1, 0], [0, 0], [0, -1]], center: [0, 0] },
    'Z': { shape: [[0, 0], [1, 0], [0, -1], [-1, -1]], center: [0, 0] }
};

function getShape(p, r) {
    if(!p) return [];
    const o = TETROMINOS[p].shape;
    if(r === 0 || p === 'O') return o;
    const c = TETROMINOS[p].center;
    return o.map(b => {
        let [x, y] = [b[0] - c[0], b[1] - c[1]];
        for(let i = 0; i < r; i++) { [x, y] = [-y, x]; }
        return [x + c[0] + (p === 'O' ? 0.5 : 0), y + c[1] + (p === 'O' ? 0.5 : 0)];
    });
}

function checkCollision(board, pt, r, px, py) {
    const shape = getShape(pt, r);
    for (const b of shape) {
        const bx = Math.floor(px + b[0]);
        const by = Math.floor(py + b[1]); // y=0 is top, y=39 is bottom
        if (bx < 0 || bx >= 10 || by >= 40) return true;
        if (by >= 0 && board[by][bx] !== null) return true;
    }
    return false;
}

// 指示通り：浮いていないことだけを確認する合法手生成
function getLegalMoves(board, pt) {
    const moves = [];
    for (let r = 0; r < 4; r++) {
        for (let x = -2; x < 12; x++) {
            for (let y = 0; y < 40; y++) {
                if (!checkCollision(board, pt, r, x, y)) {
                    // 1段下に衝突すれば（地面かブロックに接していれば）合法手
                    if (checkCollision(board, pt, r, x, y + 1)) {
                        moves.push({ x, y, r, piece: pt });
                    }
                }
            }
        }
    }
    return moves;
}

function applyMove(board, move) {
    const newBoard = board.map(row => [...row]);
    const shape = getShape(move.piece, move.r);
    shape.forEach(b => {
        const bx = Math.floor(move.x + b[0]);
        const by = Math.floor(move.y + b[1]);
        if (by >= 0 && by < 40 && bx >= 0 && bx < 10) newBoard[by][bx] = move.piece;
    });

    // ライン消去
    const clearedBoard = [];
    newBoard.forEach(row => {
        if (!row.every(cell => cell !== null)) clearedBoard.push(row);
    });
    while (clearedBoard.length < 40) clearedBoard.unshift(Array(10).fill(null));
    return clearedBoard;
}

// ==========================================
// 2. 画像認識・ONNXコア (VisionLib)
// ==========================================
const CLASS_NAMES = ['null', 'G', 'S', 'Z', 'L', 'J', 'O', 'I', 'T'];
const CONFIG = {
    p1: {
        boardRect: { x: 304, y: 157, w: 366, h: 725 },
        nextCoords: [ {x:160,y:155}, {x:500,y:122}, {x:500,y:175}, {x:500,y:225}, {x:500,y:275}, {x:500,y:325} ]
    },
    p2: {
        boardRect: { x: 1257, y: 157, w: 363, h: 725 },
        nextCoords: [ {x:790,y:155}, {x:1130,y:122}, {x:1130,y:175}, {x:1130,y:225}, {x:1130,y:275}, {x:1130,y:325} ]
    }
};

const SCAN_COLORS = { 'NULL': ['#000000', '#302838'], 'G': ['#999999', '#D8D8D8'], 'I': ['#019899', '#0199D5'], 'O': ['#999A02', '#F9B900'], 'T': ['#980099', '#871E88'], 'L': ['#996700', '#F56100'], 'J': ['#0000BB', '#004BA5'], 'S': ['#10971F', '#5CB523'], 'Z': ['#990000', '#DA1822'] };
const PARSED_COLORS = {};
for (const k in SCAN_COLORS) PARSED_COLORS[k] = SCAN_COLORS[k].map(h => ({r:parseInt(h.slice(1,3),16), g:parseInt(h.slice(3,5),16), b:parseInt(h.slice(5,7),16)}));

const VisionLib = {
    session: null,
    async init(file) {
        const buffer = await file.arrayBuffer();
        this.session = await ort.InferenceSession.create(buffer, { executionProviders: ['wasm'] });
    },
    colorDist(c1, c2) { return (c1.r-c2.r)**2 + (c1.g-c2.g)**2 + (c1.b-c2.b)**2; },
    findMino(r, g, b) {
        const c = {r, g, b};
        let minD = Infinity, closest = null;
        for (const k of Object.keys(PARSED_COLORS).filter(k=>k!=='NULL'&&k!=='G')) {
            for (const tc of PARSED_COLORS[k]) {
                const d = this.colorDist(c, tc);
                if (d < minD) { minD = d; closest = k; }
            }
        }
        return minD > 25000 ? null : closest;
    },
    getAverage(ctx, cx, cy, r) {
        const d = ctx.getImageData(cx-r, cy-r, r*2, r*2).data;
        let tr=0, tg=0, tb=0, cnt=0;
        for(let i=0; i<d.length; i+=4) {
            if(d[i]>50 || d[i+1]>50 || d[i+2]>50) { tr+=d[i]; tg+=d[i+1]; tb+=d[i+2]; cnt++; }
        }
        return cnt===0 ? {r:0,g:0,b:0} : {r:tr/cnt, g:tg/cnt, b:tb/cnt};
    },
    detectQueue(ctx, conf) {
        return conf.nextCoords.map(pt => {
            const c = this.getAverage(ctx, pt.x, pt.y, 6);
            return this.findMino(c.r, c.g, c.b);
        });
    },
    async runONNX(ctx, rect) {
        const sw = 1920, cw = rect.w/10, ch = rect.h/20;
        const input = new Float32Array(1 * 3 * 20 * 10);
        const img = ctx.getImageData(rect.x, rect.y, rect.w, rect.h);
        
        for(let cy=0; cy<20; cy++) {
            for(let cx=0; cx<10; cx++) {
                const px = Math.floor(cx * cw + cw/2);
                const py = Math.floor(cy * ch + ch/2);
                const idx = (py * rect.w + px) * 4;
                const outIdx = cy * 10 + cx;
                input[outIdx] = img.data[idx]/255;
                input[200 + outIdx] = img.data[idx+1]/255;
                input[400 + outIdx] = img.data[idx+2]/255;
            }
        }
        const tensor = new ort.Tensor('float32', input, [1, 3, 20, 10]);
        const results = await this.session.run({ input: tensor });
        const data = results[Object.keys(results)[0]].data;
        
        // エディタの 40x10 配列にマッピング (20〜39行目が表示領域)
        const board = Array.from({length:40}, () => Array(10).fill(null));
        for(let i=0; i<200; i++) {
            const cls = CLASS_NAMES[data[i]];
            board[20 + Math.floor(i/10)][i%10] = cls === 'null' ? null : cls;
        }
        return board;
    }
};

// ==========================================
// 3. 動画解析とビームサーチパイプライン
// ==========================================
const log = (msg, type='info') => {
    const el = document.getElementById('logArea');
    el.innerHTML += `<span class="${type}">[${new Date().toLocaleTimeString()}] ${msg}</span>\n`;
    el.scrollTop = el.scrollHeight;
};

const waitForSeek = v => new Promise(r => { v.onseeked = r; });

function getQueueDiffCount(prev, curr) {
    if(!prev) return 0;
    let c = 0;
    for(let i=0; i<6; i++) { if(prev[i] !== curr[i]) c++; }
    return c;
}

// 多数決ロジック
function getMajorityBoard(boards) {
    const final = Array.from({length:40}, () => Array(10).fill(null));
    for(let y=20; y<40; y++){
        for(let x=0; x<10; x++){
            const counts = {};
            boards.forEach(b => {
                const val = b[y][x];
                counts[val] = (counts[val] || 0) + 1;
            });
            let maxVal = null, maxC = 0;
            for(const [val, c] of Object.entries(counts)) {
                if(c > maxC) { maxC = c; maxVal = val==='null'?null:val; }
            }
            final[y][x] = maxVal;
        }
    }
    return final;
}

// おじゃまブロック予測挿入
function insertGarbageIntelligently(board, lines, obsBoard) {
    if (lines === 0) return board;
    const nb = board.map(r => [...r]);
    nb.splice(0, lines);
    for (let i = 0; i < lines; i++) {
        const ry = 39 - lines + 1 + i;
        let hx = 0, found = false;
        for (let x = 0; x < 10; x++) {
            if (obsBoard[ry][x] === null) { hx = x; found = true; break; }
        }
        if(!found) hx = Math.floor(Math.random()*10);
        const row = Array(10).fill('G');
        row[hx] = null;
        nb.push(row);
    }
    return nb;
}

function calcMatchScore(board, obsBoard) {
    let score = 0;
    for (let y = 20; y < 40; y++) {
        for (let x = 0; x < 10; x++) {
            const b = board[y][x];
            const o = obsBoard[y][x];
            if (o === null) { score += (b === null ? 2 : -2); }
            else if (o === 'G') { score += (b !== null ? 2 : -2); }
            else {
                if (b === o) score += 5;
                else if (b !== null) score += 1;
                else score -= 3;
            }
        }
    }
    return score;
}

async function runBeamSearch(playerStr, events, initBoard) {
    const BEAM_WIDTH = 15;
    let beam = [{ board: initBoard, hold: events[0]?.queue[0] || null, score: 0, history: [] }];

    for (let i = 1; i < events.length; i++) {
        const obs = events[i];
        const prevQueue = events[i-1].queue;
        const newBeam = [];
        
        // 利用可能なミノ（HoldとNext1の両方を試す）
        const pieces = [];
        if (prevQueue[1]) pieces.push({ p: prevQueue[1], useHold: false });
        if (prevQueue[0]) pieces.push({ p: prevQueue[0], useHold: true });
        if (pieces.length === 0) pieces.push({ p: 'T', useHold: false }); // 最終フォールバック

        for (const state of beam) {
            for (const pt of pieces) {
                // ゴミなし〜3ラインを想定して全探索
                for (let g = 0; g <= 3; g++) {
                    const bg = insertGarbageIntelligently(state.board, g, obs.board);
                    const moves = getLegalMoves(bg, pt.p);
                    
                    for (const m of moves) {
                        const nb = applyMove(bg, m);
                        const match = calcMatchScore(nb, obs.board);
                        
                        newBeam.push({
                            board: nb,
                            hold: pt.useHold ? prevQueue[1] : (state.hold || prevQueue[0]),
                            score: state.score + match,
                            history: [...state.history, { 
                                b: nb, h: pt.useHold ? prevQueue[1] : (state.hold || prevQueue[0]), 
                                n: obs.queue.slice(1).join(''), time: obs.time 
                            }]
                        });
                    }
                }
            }
        }
        
        newBeam.sort((a,b) => b.score - a.score);
        beam = newBeam.slice(0, BEAM_WIDTH);
        log(`[${playerStr}] ターン ${i}/${events.length-1} 完了。トップスコア: ${beam[0].score}`);
    }
    return beam[0]; // Best path
}

// 文字列から初期盤面生成
function parseInitBoard(text) {
    const b = Array.from({length:40}, () => Array(10).fill(null));
    const lines = text.trim().split('\n').filter(l=>l);
    if(lines.length === 0) return b;
    let startY = 40 - lines.length;
    for(let i=0; i<lines.length; i++) {
        const chars = lines[i].split('');
        for(let x=0; x<10; x++) {
            if(chars[x] && chars[x] !== '_') b[startY + i][x] = chars[x];
        }
    }
    return b;
}

// エディタリンク出力用
function boardToString1D(board) { return board.map(row => row.map(c => c === null ? '_' : c).join('')).join(''); }
function encodeRLE(str) {
    let res = '', c = 1;
    for (let i=0; i<str.length; i++) {
        if(str[i] === str[i+1]) c++;
        else { res += str[i] + c; c = 1; }
    }
    return res;
}
function getDifference(prev, curr) {
    let d = '';
    for(let i=0; i<prev.length; i++) d += (prev[i] === curr[i]) ? '=' : curr[i];
    return d;
}

function createEditorLink(pagesData) {
    const jsonStr = JSON.stringify(pagesData);
    const binStr = new TextEncoder().encode(jsonStr).reduce((a, b) => a + String.fromCharCode(b), '');
    return 'https://fumen-editor-hub.com/editor.html#' + btoa(binStr);
}

// ==========================================
// 4. メインルーチン
// ==========================================
document.getElementById('modelInput').onchange = e => {
    if(e.target.files.length>0 && document.getElementById('videoInput').files.length>0) {
        document.getElementById('startBtn').disabled = false;
    }
};
document.getElementById('videoInput').onchange = document.getElementById('modelInput').onchange;

document.getElementById('startBtn').addEventListener('click', async () => {
    document.getElementById('startBtn').disabled = true;
    log('処理を開始します...');
    
    await VisionLib.init(document.getElementById('modelInput').files[0]);
    log('ONNXモデルをロードしました。');

    const video = document.getElementById('videoPlayer');
    const canvas = document.getElementById('processCanvas');
    canvas.width = 1920; canvas.height = 1080;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    video.src = URL.createObjectURL(document.getElementById('videoInput').files[0]);
    await new Promise(r => { video.onloadedmetadata = r; });
    log(`動画ロード完了: ${video.duration}秒`);

    // --- Pass 1: 区間検知 ---
    log('Pass 1: ネクスト変化から操作区間を検出中...');
    let t = 0;
    let p1Events = [], p2Events = [];
    let p1Prev = null, p2Prev = null;

    while(t <= video.duration) {
        video.currentTime = t;
        await waitForSeek(video);
        
        // 16:9クロップ
        const tarW = video.videoHeight * 16/9;
        const cx = (video.videoWidth - tarW)/2;
        ctx.drawImage(video, cx, 0, tarW, video.videoHeight, 0, 0, 1920, 1080);
        
        const p1Q = VisionLib.detectQueue(ctx, CONFIG.p1);
        const p2Q = VisionLib.detectQueue(ctx, CONFIG.p2);
        
        if (!p1Prev || getQueueDiffCount(p1Prev, p1Q) >= 2) { p1Events.push({time: t, queue: p1Q}); p1Prev = p1Q; }
        if (!p2Prev || getQueueDiffCount(p2Prev, p2Q) >= 2) { p2Events.push({time: t, queue: p2Q}); p2Prev = p2Q; }
        
        t += 0.1;
    }
    log(`Pass 1 完了。 P1手番数: ${p1Events.length}, P2手番数: ${p2Events.length}`);

    // --- Pass 2: 区間ごとのONNX多数決 ---
    async function processONNX(events, config) {
        for(let i=0; i<events.length; i++) {
            const startT = i===0 ? 0 : events[i-1].time;
            const endT = events[i].time;
            const diff = endT - startT;
            const samples = [startT + diff*0.3, startT + diff*0.6, startT + diff*0.9].map(x => Math.min(x, video.duration));
            
            const boards = [];
            for(const st of samples) {
                video.currentTime = st;
                await waitForSeek(video);
                const tarW = video.videoHeight * 16/9;
                ctx.drawImage(video, (video.videoWidth - tarW)/2, 0, tarW, video.videoHeight, 0, 0, 1920, 1080);
                boards.push(await VisionLib.runONNX(ctx, config.boardRect));
            }
            events[i].board = getMajorityBoard(boards);
        }
    }
    
    log('Pass 2: P1の盤面をONNXで認識中...');
    await processONNX(p1Events, CONFIG.p1);
    log('Pass 2: P2の盤面をONNXで認識中...');
    await processONNX(p2Events, CONFIG.p2);

    // --- Pass 3: ビームサーチ ---
    log('Pass 3: P1 ビームサーチ実行中...');
    const p1Best = await runBeamSearch('P1', p1Events, parseInitBoard(document.getElementById('p1InitBoard').value));
    log('Pass 3: P2 ビームサーチ実行中...');
    const p2Best = await runBeamSearch('P2', p2Events, parseInitBoard(document.getElementById('p2InitBoard').value));

    // --- Pass 4: リンク出力 ---
    log('最終結合とリンク生成を行っています...');
    
    function convertToPages(history) {
        let pages = [];
        let prevBoard1D = null;
        for (let i=0; i<history.length; i++) {
            const h = history[i];
            const board1D = boardToString1D(h.b);
            const enc = i === 0 ? encodeRLE(board1D) : encodeRLE(getDifference(prevBoard1D, board1D));
            pages.push({ b: enc, h: h.h||'', n: h.n||'', time: h.time });
            prevBoard1D = board1D;
        }
        return pages;
    }

    const p1Pages = convertToPages(p1Best.history);
    const p2Pages = convertToPages(p2Best.history);

    // 個別出力
    const outP1 = p1Pages.map(p => ({ p1: { b: p.b, h: p.h, n: p.n } }));
    const outP2 = p2Pages.map(p => ({ p2: { b: p.b, h: p.h, n: p.n } }));
    
    // 時系列結合出力
    const merged = [];
    let p1Idx = 0, p2Idx = 0;
    let lastP1 = { b: p1Pages[0]?.b||'', h:'', n:'' };
    let lastP2 = { b: p2Pages[0]?.b||'', h:'', n:'' };

    // すべてのタイムスタンプを抽出してソート
    const times = [...new Set([...p1Pages.map(x=>x.time), ...p2Pages.map(x=>x.time)])].sort((a,b)=>a-b);
    for(const t of times) {
        if(p1Idx < p1Pages.length && p1Pages[p1Idx].time <= t) { lastP1 = p1Pages[p1Idx]; p1Idx++; }
        if(p2Idx < p2Pages.length && p2Pages[p2Idx].time <= t) { lastP2 = p2Pages[p2Idx]; p2Idx++; }
        merged.push({ p1: {b: lastP1.b, h: lastP1.h, n: lastP1.n}, p2: {b: lastP2.b, h: lastP2.h, n: lastP2.n} });
    }

    document.getElementById('resultPanel').style.display = 'block';
    document.getElementById('linkP1').href = createEditorLink(outP1);
    document.getElementById('linkP2').href = createEditorLink(outP2);
    document.getElementById('linkMerged').href = createEditorLink(merged);

    log('完了しました！上のリンクからエディタで確認できます。', 'success');
});
</script>
</body>
</html>
