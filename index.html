<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris Video Analyzer with Beam Search</title>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
<style>
    :root { --bg: #1a1a2e; --primary: #4b4b7c; --accent: #00a0f0; --text: #e0e0e0; }
    body { background-color: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; padding: 20px; margin: 0; }
    h1, h2 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
    .container { max-width: 1000px; margin: 0 auto; }
    .panel { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--primary); }
    .controls { display: grid; gap: 15px; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
    button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
    button:disabled { background: #555; cursor: not-allowed; }
    button:hover:not(:disabled) { opacity: 0.9; }
    input[type="file"] { padding: 10px; background: rgba(0,0,0,0.3); border-radius: 4px; width: 100%; box-sizing: border-box; }
    .progress-section { margin-top: 20px; }
    progress { width: 100%; height: 20px; border-radius: 10px; }
    #logArea { background: #000; border: 1px solid #555; height: 300px; overflow-y: scroll; font-family: monospace; white-space: pre-wrap; padding: 10px; font-size: 12px; margin-top: 10px; }
    .log-info { color: #4db8ff; } .log-warn { color: #ffff00; } .log-error { color: #ff4444; } .log-success { color: #00ff00; }
    .result-link { font-size: 1.2em; word-break: break-all; background: #000; padding: 15px; border-radius: 5px; border: 1px solid var(--accent); margin-top: 10px;}
    a { color: var(--accent); }
    #videoPlayer, #processCanvas { display: none; }
</style>
</head>
<body>

<div class="container">
    <h1>Tetris Video Analyzer (Beam Search Edition)</h1>
    <p>動画を解析し、多数決とビームサーチを用いて物理的に矛盾のないテト譜を自動生成します。</p>

    <div class="panel">
        <h2>1. 準備</h2>
        <div class="controls">
            <div>
                <label>1. ONNXモデル (tetris.onnx)</label>
                <input type="file" id="modelInput" accept=".onnx">
            </div>
            <div>
                <label>2. 解析する動画 (MP4/WebM)</label>
                <input type="file" id="videoInput" accept="video/*">
            </div>
        </div>
        <div style="margin-top: 15px; display: flex; gap: 20px;">
            <label>スキャン間隔: <input type="number" id="scanInterval" value="0.2" step="0.1" style="width: 60px;"> 秒</label>
            <label>ビーム幅: <input type="number" id="beamWidth" value="5" step="1" style="width: 60px;"> (探索の広さ)</label>
        </div>
    </div>

    <div class="panel">
        <h2>2. 実行</h2>
        <button id="startBtn" disabled>解析開始</button>
        <button id="stopBtn" disabled style="background-color: #f00;">停止</button>
        
        <div class="progress-section">
            <div>P1 Progress: <span id="p1Status">待機中</span></div>
            <progress id="p1Progress" value="0" max="100"></progress>
        </div>
        <div class="progress-section">
            <div>P2 Progress: <span id="p2Status">待機中</span></div>
            <progress id="p2Progress" value="0" max="100"></progress>
        </div>
        
        <h3>System Log</h3>
        <div id="logArea"></div>
    </div>

    <div class="panel hidden" id="resultPanel" style="display:none;">
        <h2>3. 結果</h2>
        <p>※出力されたリンクをコピーして、エディタのブラウザタブで開いてください。</p>
        <div class="result-link">
            <a id="finalLink" href="#" target="_blank">生成中...</a>
        </div>
    </div>
</div>

<video id="videoPlayer" muted playsinline></video>
<canvas id="processCanvas"></canvas>

<script>
// ==========================================
//  Constants & Configurations
// ==========================================
const CONFIG = {
    p1: {
        boardRect: { x: 304, y: 157, w: 366, h: 725 },
        nextCoords: [ {x:160, y:155}, {x:500, y:122}, {x:500, y:175}, {x:500, y:225}, {x:500, y:275}, {x:500, y:325} ]
    },
    p2: {
        boardRect: { x: 1257, y: 157, w: 363, h: 725 },
        nextCoords: [ {x:790, y:155}, {x:1130, y:122}, {x:1130, y:175}, {x:1130, y:225}, {x:1130, y:275}, {x:1130, y:325} ]
    }
};

const CLASS_NAMES = ['null', 'G', 'S', 'Z', 'L', 'J', 'O', 'I', 'T'];
const MINO_TYPES = ['I', 'O', 'T', 'L', 'J', 'S', 'Z'];

// 中心からの相対座標 (ユーザー指定のフォーマット)
const MINO_SHAPES = {
    'I': [[-1,0], [0,0], [1,0], [2,0]],
    'O': [[0,0], [1,0], [0,-1], [1,-1]],
    'T': [[-1,0], [0,0], [1,0], [0,-1]],
    'L': [[-1,0], [0,0], [1,0], [1,-1]],
    'J': [[-1,0], [0,0], [1,0], [-1,-1]],
    'S': [[-1,0], [0,0], [0,-1], [1,-1]],
    'Z': [[0,0], [1,0], [0,-1], [-1,-1]]
};

const SCAN_COLOR_PALETTE = { 
    'NULL': ['#000000', '#302838'], 'G': ['#999999', '#D8D8D8'], 'I': ['#019899', '#0199D5'], 
    'O': ['#999A02', '#F9B900'], 'T': ['#980099', '#871E88'], 'L': ['#996700', '#F56100'], 
    'J': ['#0000BB', '#004BA5'], 'S': ['#10971F', '#5CB523'], 'Z': ['#990000', '#DA1822'] 
};

const hexToRgb = (hex) => ({ r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) });
const PARSED_SCAN_COLORS = {};
for (const key in SCAN_COLOR_PALETTE) PARSED_SCAN_COLORS[key] = SCAN_COLOR_PALETTE[key].map(hexToRgb);
const colorDistanceSq = (c1, c2) => ((c1.r - c2.r)**2 + (c1.g - c2.g)**2 + (c1.b - c2.b)**2);

let session = null;
let isRunning = false;
let stopRequested = false;

// ==========================================
//  Logging & UI
// ==========================================
function log(msg, type='info') {
    const logArea = document.getElementById('logArea');
    const div = document.createElement('div');
    div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    div.className = `log-${type}`;
    logArea.appendChild(div);
    logArea.scrollTop = logArea.scrollHeight;
}

// ==========================================
//  Image Recognition Core (Ported completely)
// ==========================================
function findClosestColor(r, g, b) { 
    const input = { r, g, b };
    for (const c of PARSED_SCAN_COLORS.NULL) if (colorDistanceSq(input, c) < 6000) return null;
    for (const c of PARSED_SCAN_COLORS.G) if (colorDistanceSq(input, c) < 10000) return 'G';
    let minD = Infinity, closest = null;
    for (const key of MINO_TYPES) {
        for (const tc of PARSED_SCAN_COLORS[key]) {
            const d = colorDistanceSq(input, tc);
            if (d < minD) { minD = d; closest = key; }
        }
    }
    return (minD > 25000) ? null : closest; 
}

function findClosestMinoOnly(r, g, b) { 
    const input = { r, g, b };
    let minD = Infinity, closest = 'I'; 
    for (const key of MINO_TYPES) {
        for (const tc of PARSED_SCAN_COLORS[key]) {
            const d = colorDistanceSq(input, tc);
            if (d < minD) { minD = d; closest = key; }
        }
    }
    return closest;
}

function getAverageColorNonBlack(ctx, cx, cy, radius) {
    const sx = Math.max(0, Math.floor(cx - radius)), sy = Math.max(0, Math.floor(cy - radius));
    const d = Math.ceil(radius * 2);
    const ex = Math.min(ctx.canvas.width, sx + d), ey = Math.min(ctx.canvas.height, sy + d);
    const w = ex - sx, h = ey - sy;
    if (w <= 0 || h <= 0) return { r: 0, g: 0, b: 0 };
    const imgData = ctx.getImageData(sx, sy, w, h).data;
    let tr=0, tg=0, tb=0, c=0;
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            if ((sx+x-cx)**2 + (sy+y-cy)**2 <= radius**2) {
                const i = (y*w+x)*4;
                if (imgData[i]>50 || imgData[i+1]>50 || imgData[i+2]>50) {
                    tr+=imgData[i]; tg+=imgData[i+1]; tb+=imgData[i+2]; c++;
                }
            }
        }
    }
    return c === 0 ? { r: 0, g: 0, b: 0 } : { r: tr/c, g: tg/c, b: tb/c };
}

function processImageTo1080p(imgCanvas) {
    const srcW = imgCanvas.width, srcH = imgCanvas.height;
    const tAspect = 16 / 9, sAspect = srcW / srcH;
    let cW, cH, cX, cY;
    if (sAspect > tAspect) { cH = srcH; cW = srcH * tAspect; cX = (srcW - cW) / 2; cY = 0; } 
    else { cW = srcW; cH = srcW / tAspect; cX = 0; cY = (srcH - cH) / 2; }

    const canvas = document.createElement('canvas');
    canvas.width = 1920; canvas.height = 1080;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(imgCanvas, cX, cY, cW, cH, 0, 0, 1920, 1080);
    return { canvas, cropData: { cX, cY, cW, cH } };
}

function extractCellPixels(imgData, x, y, w, h) {
    const sw = imgData.width, ix = Math.floor(x), iy = Math.floor(y), iw = Math.floor(w), ih = Math.floor(h);
    const d = new Uint8ClampedArray(iw * ih * 4);
    for (let r = 0; r < ih; r++) {
        const s = ((iy + r) * sw + ix) * 4;
        d.set(imgData.data.subarray(s, s + iw * 4), r * iw * 4);
    }
    return d;
}

function extractFeaturesJS(pixelsRGBA, w, h) {
    const numPixels = w * h;
    const feats = [];
    const bCh = new Float32Array(numPixels), gCh = new Float32Array(numPixels), rCh = new Float32Array(numPixels);
    const hCh = new Float32Array(numPixels), sCh = new Float32Array(numPixels), vCh = new Float32Array(numPixels);

    for (let i = 0; i < numPixels; i++) {
        const r = pixelsRGBA[i*4], g = pixelsRGBA[i*4+1], b = pixelsRGBA[i*4+2];
        bCh[i] = b; gCh[i] = g; rCh[i] = r;
        const maxV = Math.max(r,g,b), minV = Math.min(r,g,b), diff = maxV - minV;
        vCh[i] = maxV;
        sCh[i] = maxV !== 0 ? (diff/maxV)*255 : 0;
        let hv = 0;
        if (maxV !== minV) {
            if (maxV === r) hv = (60*(g-b)/diff+360)%360;
            else if (maxV === g) hv = (60*(b-r)/diff+120)%360;
            else if (maxV === b) hv = (60*(r-g)/diff+240)%360;
        }
        hCh[i] = hv / 2;
    }

    const getStats = (arr) => {
        let sum = 0; for(let v of arr) sum += v;
        const mean = sum / arr.length;
        let sq = 0; for(let v of arr) sq += (v - mean)**2;
        return [mean, Math.sqrt(sq / arr.length)];
    };

    feats.push(...getStats(bCh), ...getStats(gCh), ...getStats(rCh));
    feats.push(...getStats(hCh), ...getStats(sCh), ...getStats(vCh));

    const sX = w/4, sY = h/4;
    for (let ty = 0; ty < 4; ty++) {
        for (let tx = 0; tx < 4; tx++) {
            const stX=Math.floor(tx*sX), stY=Math.floor(ty*sY), enX=Math.floor((tx+1)*sX), enY=Math.floor((ty+1)*sY);
            let sB=0, sG=0, sR=0, c=0;
            for(let py=stY; py<enY; py++) for(let px=stX; px<enX; px++) {
                const idx = py*w+px;
                if(idx < numPixels) { sB+=bCh[idx]; sG+=gCh[idx]; sR+=rCh[idx]; c++; }
            }
            if(c===0) feats.push(0,0,0); else feats.push(sB/c, sG/c, sR/c);
        }
    }

    const cx = Math.floor(w/2), cy = Math.floor(h/2), cw = Math.floor(w/4), ch = Math.floor(h/4);
    let cB=0, cG=0, cR=0, cc=0;
    for(let py=cy-ch; py<cy+ch; py++) for(let px=cx-cw; px<cx+cw; px++) {
        if(px>=0&&px<w&&py>=0&&py<h) { const idx=py*w+px; cB+=bCh[idx]; cG+=gCh[idx]; cR+=rCh[idx]; cc++; }
    }
    if(cc===0) feats.push(0,0,0); else feats.push(cB/cc, cG/cc, cR/cc);

    return new Float32Array(feats);
}

async function analyzePlayerRaw(canvas, config) {
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const bRect = config.boardRect;
    const bImg = ctx.getImageData(bRect.x, bRect.y, bRect.w, bRect.h);
    const cellW = bRect.w / 10, cellH = bRect.h / 20;
    
    // Classic (補正用)
    const classicBoard = [];
    for (let r = 0; r < 20; r++) {
        const row = [];
        for (let c = 0; c < 10; c++) {
            const sSize = Math.max(1, Math.floor(cellW * 0.25));
            const sX = bRect.x + (c+0.5)*cellW - sSize/2, sY = bRect.y + (r+0.5)*cellH - sSize/2;
            const data = ctx.getImageData(sX, sY, sSize, sSize).data;
            let aR=0, aG=0, aB=0;
            for(let i=0; i<data.length; i+=4) { aR+=data[i]; aG+=data[i+1]; aB+=data[i+2]; }
            const pCnt = data.length/4;
            row.push(findClosestColor(aR/pCnt, aG/pCnt, aB/pCnt));
        }
        classicBoard.push(row);
    }

    // ONNX
    const batchFeats = [];
    for (let r = 0; r < 20; r++) {
        for (let c = 0; c < 10; c++) {
            const cPix = extractCellPixels(bImg, c*cellW, r*cellH, cellW, cellH);
            batchFeats.push(extractFeaturesJS(cPix, Math.floor(cellW), Math.floor(cellH)));
        }
    }

    const flatInput = new Float32Array(200 * 63);
    for (let i = 0; i < 200; i++) flatInput.set(batchFeats[i], i * 63);
    const tensor = new ort.Tensor('float32', flatInput, [200, 63]);
    const results = await session.run({ [session.inputNames[0]]: tensor });
    const labels = results[session.outputNames[0]].data;

    const recognized = [];
    for (let i = 0; i < 200; i++) {
        if(i%10 === 0) recognized.push([]);
        const lbl = CLASS_NAMES[Number(labels[i])];
        recognized[Math.floor(i/10)].push(lbl === 'null' ? null : lbl);
    }

    // Merge Correction
    for (let r = 0; r < 20; r++) {
        if (recognized[r].every(c => c===null||c==='G')) {
            if (recognized[r].filter(c=>c==='G').length !== 10) {
                if (classicBoard[r].filter(c=>c==='G').length === 9 && classicBoard[r].filter(c=>c===null).length === 1) {
                    recognized[r] = [...classicBoard[r]];
                }
            }
        }
    }

    // Next/Hold
    const nextQ = []; let hold = null;
    const scale = canvas.width / 1920; 
    for (let i = 0; i < config.nextCoords.length; i++) {
        const coord = config.nextCoords[i];
        const avg = getAverageColorNonBlack(ctx, coord.x * scale, coord.y * scale, 5 * scale);
        const isBlack = avg.r<50 && avg.g<50 && avg.b<50;
        if (i === 0) hold = isBlack ? null : findClosestColor(avg.r, avg.g, avg.b);
        else {
            if (i === 1 && isBlack) break;
            const fm = findClosestMinoOnly(avg.r, avg.g, avg.b);
            if (fm) nextQ.push(fm);
        }
    }

    return { board: recognized, hold, next: nextQ };
}

// ==========================================
//  Majority Voting
// ==========================================
class VoteAggregator {
    constructor() { this.reset(); }
    reset() {
        this.votes = Array.from({length: 20}, () => Array.from({length: 10}, () => ({})));
        this.count = 0;
    }
    add(board20) {
        this.count++;
        for(let y=0; y<20; y++) {
            for(let x=0; x<10; x++) {
                const v = board20[y][x] || 'null';
                this.votes[y][x][v] = (this.votes[y][x][v] || 0) + 1;
            }
        }
    }
    getWinner() {
        if(this.count === 0) return null;
        const res = [];
        for(let y=0; y<20; y++) {
            const row = [];
            for(let x=0; x<10; x++) {
                let max = -1, win = null;
                for(const [val, cnt] of Object.entries(this.votes[y][x])) {
                    if(cnt > max) { max = cnt; win = val; }
                }
                row.push(win === 'null' ? null : win);
            }
            res.push(row);
        }
        return res;
    }
}

// ==========================================
//  Beam Search & State Generation
// ==========================================

// 盤面を40行に拡張し、下から詰めるヘルパー
function convertTo40LineBoard(board20) {
    const full = Array.from({ length: 40 }, () => Array(10).fill(null));
    for(let r=0; r<20; r++) full[20+r] = board20[r];
    
    // ガベージ・不要行のクリーンアップ (動画解析のロジック準拠)
    let firstNonG = -1;
    for(let y=39; y>=0; y--) { if(!full[y].includes('G')) { firstNonG = y; break; } }
    if(firstNonG !== -1) {
        for(let y=firstNonG-1; y>=0; y--) {
            for(let x=0; x<10; x++) { if(full[y][x]==='G') full[y][x] = null; }
        }
    }
    return full;
}

function cloneBoard(board) { return board.map(row => [...row]); }

// ミノを回転させて座標を取得
function getRotatedShape(type, rot) {
    const shape = MINO_SHAPES[type];
    if (type === 'O') return shape;
    return shape.map(b => {
        let [x, y] = [b[0], b[1]];
        for(let i=0; i<rot; i++) [x,y] = [-y, x];
        return [x, y];
    });
}

// 衝突判定
function checkCollision(board, type, rot, cx, cy) {
    const shape = getRotatedShape(type, rot);
    for (const [dx, dy] of shape) {
        const nx = cx + dx, ny = cy + dy;
        if (nx < 0 || nx >= 10 || ny >= 40) return true;
        if (ny >= 0 && board[ny][nx] !== null) return true;
    }
    return false;
}

// 接地判定（1マス下が衝突するか）
function isGrounded(board, type, rot, cx, cy) {
    return checkCollision(board, type, rot, cx, cy + 1);
}

// 合法手生成（壁にめり込まず、空中に浮いていない全ての配置）
function generateLegalMoves(board, type) {
    const moves = [];
    // 緩い条件：各回転状態について、全マスを走査
    const rots = (type === 'O') ? [0] : (type === 'I' || type === 'S' || type === 'Z' ? [0, 1] : [0, 1, 2, 3]);
    
    for (const rot of rots) {
        for (let y = 0; y < 40; y++) {
            for (let x = 0; x < 10; x++) {
                if (!checkCollision(board, type, rot, x, y) && isGrounded(board, type, rot, x, y)) {
                    moves.push({ x, y, rot, type });
                }
            }
        }
    }
    return moves;
}

// 盤面にミノを適用し、ライン消去を行う
function applyMove(board, move) {
    const newBoard = cloneBoard(board);
    const shape = getRotatedShape(move.type, move.rot);
    for (const [dx, dy] of shape) {
        const nx = move.x + dx, ny = move.y + dy;
        if (ny >= 0 && ny < 40) newBoard[ny][nx] = move.type;
    }
    
    // ライン消去
    let linesCleared = 0;
    for (let y = 39; y >= 0; y--) {
        if (newBoard[y].every(c => c !== null && c !== 'G')) {
            newBoard.splice(y, 1);
            newBoard.unshift(Array(10).fill(null));
            linesCleared++;
            y++; // 再チェック
        }
    }
    return { board: newBoard, linesCleared };
}

// 盤面の一致度スコア計算（観測盤面との比較）
function calculateMatchScore(predBoard, obsBoard20) {
    let score = 0;
    // 観測盤面は下半分(20~39)
    for (let y = 0; y < 20; y++) {
        for (let x = 0; x < 10; x++) {
            const obs = obsBoard20[y][x];
            const pred = predBoard[20 + y][x];
            if (obs === null && pred === null) score += 1;
            else if (obs === pred) score += 5; // 正解ブロック一致は高評価
            else score -= 2; // 不一致ペナルティ
        }
    }
    return score;
}

// ビームサーチ本体
// timeline: { time, board20(Majority), hold, next } の配列
function runBeamSearch(timeline, beamWidth) {
    if (timeline.length === 0) return [];
    
    log(`ビームサーチ開始 (ステップ数: ${timeline.length}, ビーム幅: ${beamWidth})`, 'info');
    
    // 初期状態 (最初の観測盤面を信じる)
    const initialBoard = convertTo40LineBoard(timeline[0].board20);
    let beam = [ { board: initialBoard, score: 0, history: [ { board: initialBoard, time: timeline[0].time, hold: timeline[0].hold, next: timeline[0].next } ] } ];

    // ステップ1以降を探索
    for (let t = 1; t < timeline.length; t++) {
        const obs = timeline[t];
        let nextBeam = [];
        
        for (const state of beam) {
            // このターンで使われた可能性のあるミノを推測
            // 厳密なNext/Hold管理はズレやすいため、全7種を試すロバストなアプローチ
            for (const piece of MINO_TYPES) {
                const legalMoves = generateLegalMoves(state.board, piece);
                
                for (const move of legalMoves) {
                    const { board: nextBoard } = applyMove(state.board, move);
                    const matchScore = calculateMatchScore(nextBoard, obs.board20);
                    
                    nextBeam.push({
                        board: nextBoard,
                        score: state.score + matchScore,
                        history: [...state.history, { board: nextBoard, time: obs.time, hold: obs.hold, next: obs.next }]
                    });
                }
            }
            
            // 何もしない（ノイズによるターンの誤検知対策）という遷移も許容
            nextBeam.push({
                board: state.board,
                score: state.score + calculateMatchScore(state.board, obs.board20) - 10, // ペナルティ
                history: [...state.history, { board: state.board, time: obs.time, hold: obs.hold, next: obs.next }]
            });
        }
        
        // スコア降順ソート＆ビーム幅でカット
        nextBeam.sort((a, b) => b.score - a.score);
        beam = nextBeam.slice(0, beamWidth);
        
        if (t % 10 === 0) log(`BeamSearch 進捗: ${t} / ${timeline.length}`, 'info');
    }
    
    log(`ビームサーチ完了。最高スコア: ${beam[0].score}`, 'success');
    return beam[0].history;
}


// ==========================================
//  Video Processing Loop
// ==========================================
function diffCount(str1, str2) {
    if (!str1 || !str2) return 99;
    let d = 0;
    const len = Math.min(str1.length, str2.length);
    for(let i=0; i<len; i++) if(str1[i] !== str2[i]) d++;
    d += Math.abs(str1.length - str2.length);
    return d;
}

async function processPlayer(playerId, video, duration, scanInterval) {
    log(`${playerId.toUpperCase()} 動画スキャン開始...`, 'info');
    const pEl = document.getElementById(`${playerId}Progress`);
    const sEl = document.getElementById(`${playerId}Status`);
    
    const rawTimeline = [];
    const agg = new VoteAggregator();
    
    let curNextStr = "";
    let lastHold = "";
    let lastNext = [];
    
    for(let t = 0; t <= duration; t += scanInterval) {
        if(stopRequested) break;
        video.currentTime = t;
        await new Promise(r => { video.onseeked = r; });
        
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = video.videoWidth; tempCanvas.height = video.videoHeight;
        tempCanvas.getContext('2d').drawImage(video, 0, 0);
        
        const { canvas: pCanvas } = processImageTo1080p(tempCanvas);
        const res = await analyzePlayerRaw(pCanvas, CONFIG[playerId]);
        
        const nextStr = res.next.join('');
        
        if (curNextStr === "") {
            curNextStr = nextStr; lastHold = res.hold; lastNext = res.next;
        }
        
        // 変化箇所が2箇所以上かチェック (Holdの変更も含める)
        let changedPoints = diffCount(curNextStr, nextStr);
        if (res.hold !== lastHold) changedPoints += 1;

        if (changedPoints >= 2) {
            // 区間確定
            const winner = agg.getWinner();
            if (winner) {
                rawTimeline.push({ time: t - scanInterval, board20: winner, hold: lastHold, next: lastNext.join('') });
            }
            agg.reset();
            curNextStr = nextStr;
        }
        
        if (changedPoints < 2) {
            agg.add(res.board);
            lastHold = res.hold; lastNext = res.next;
        }

        const pct = Math.floor((t / duration) * 100);
        pEl.value = pct; sEl.textContent = `${pct}% (${t.toFixed(1)}s)`;
    }

    // Last segment
    const winner = agg.getWinner();
    if (winner) rawTimeline.push({ time: duration, board20: winner, hold: lastHold, next: lastNext.join('') });

    log(`${playerId.toUpperCase()} スキャン完了。ターン数: ${rawTimeline.length}`, 'success');
    
    const beamWidth = parseInt(document.getElementById('beamWidth').value) || 5;
    const cleanedTimeline = runBeamSearch(rawTimeline, beamWidth);
    
    pEl.value = 100; sEl.textContent = "完了";
    return cleanedTimeline;
}

// ==========================================
//  Fumen Serialization (Tetofu v2 Logic)
// ==========================================
function boardToString1D(board) {
    const res = [];
    for(let y=0; y<40; y++) {
        for(let x=0; x<10; x++) res.push(board[y][x] === null ? '_' : board[y][x]);
    }
    return res;
}

function encodeRLE(data) {
    if (!data || data.length === 0) return [];
    const rle = [];
    let last = data[0], cnt = 1;
    for (let i = 1; i < data.length; i++) {
        if (data[i] === last) cnt++;
        else { rle.push([last, cnt]); last = data[i]; cnt = 1; }
    }
    rle.push([last, cnt]);
    return rle;
}

function getDifference(prev, curr) {
    const diff = [];
    for (let i = 0; i < prev.length; i++) diff.push(prev[i] === curr[i] ? 'E' : curr[i]);
    return diff;
}

function generateFumenUrl(p1Timeline, p2Timeline) {
    const allTimes = new Set([...p1Timeline.map(e=>e.time), ...p2Timeline.map(e=>e.time)]);
    const sortedTimes = Array.from(allTimes).sort((a,b) => a-b);
    
    let p1Idx = 0, p2Idx = 0;
    const pages = [];
    let prevP1 = null, prevP2 = null;

    for (let t of sortedTimes) {
        while(p1Idx < p1Timeline.length - 1 && p1Timeline[p1Idx+1].time <= t) p1Idx++;
        while(p2Idx < p2Timeline.length - 1 && p2Timeline[p2Idx+1].time <= t) p2Idx++;
        
        const p1 = p1Timeline[p1Idx];
        const p2 = p2Timeline[p2Idx];
        
        const page = { p1: {}, p2: {} };
        
        if (p1) {
            const b1d = boardToString1D(p1.board);
            page.p1.b = prevP1 ? encodeRLE(getDifference(prevP1, b1d)) : encodeRLE(b1d);
            page.p1.h = p1.hold || ''; page.p1.n = p1.next || '';
            prevP1 = b1d;
        }
        
        if (p2) {
            const b1d = boardToString1D(p2.board);
            page.p2.b = prevP2 ? encodeRLE(getDifference(prevP2, b1d)) : encodeRLE(b1d);
            page.p2.h = p2.hold || ''; page.p2.n = p2.next || '';
            prevP2 = b1d;
        }
        
        pages.push(page);
    }

    const exportObj = { v: 'f2', m: '2P', p: pages };
    const jsonStr = JSON.stringify(exportObj);
    const b64 = btoa(String.fromCharCode.apply(null, new TextEncoder().encode(jsonStr)));
    
    // エディタのURL (同一階層のFフォルダを想定)
    return `https://selmtoe.github.io/Tetris_Simulator/F/index.html#${b64}`;
}

// ==========================================
//  Main Application Logic
// ==========================================
document.getElementById('modelInput').addEventListener('change', async (e) => {
    if(e.target.files[0]) {
        try {
            const buf = await e.target.files[0].arrayBuffer();
            session = await ort.InferenceSession.create(buf, { executionProviders: ['wasm'] });
            log("ONNXモデル ロード完了", 'success');
            checkReady();
        } catch(err) { log("モデルロード失敗: " + err, 'error'); }
    }
});

const videoInput = document.getElementById('videoInput');
videoInput.addEventListener('change', checkReady);

function checkReady() {
    if(session && videoInput.files.length > 0) document.getElementById('startBtn').disabled = false;
}

document.getElementById('startBtn').addEventListener('click', async () => {
    isRunning = true; stopRequested = false;
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    
    const file = videoInput.files[0];
    const video = document.getElementById('videoPlayer');
    video.src = URL.createObjectURL(file);

    try {
        await new Promise(r => { video.onloadedmetadata = r; });
        const dur = video.duration;
        const interval = parseFloat(document.getElementById('scanInterval').value) || 0.2;
        log(`動画解析開始: ${dur.toFixed(1)}秒`, 'info');

        const p1Time = await processPlayer('p1', video, dur, interval);
        if(stopRequested) throw new Error("Stopped by user");
        const p2Time = await processPlayer('p2', video, dur, interval);
        if(stopRequested) throw new Error("Stopped by user");

        log("データ統合中...", 'info');
        const url = generateFumenUrl(p1Time, p2Time);
        
        const link = document.getElementById('finalLink');
        link.href = url; link.textContent = url;
        document.getElementById('resultPanel').style.display = 'block';
        log("全処理完了！", 'success');

    } catch (e) {
        log("処理終了: " + e.message, 'error');
    } finally {
        isRunning = false;
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
    }
});

document.getElementById('stopBtn').addEventListener('click', () => {
    stopRequested = true;
    log("停止リクエスト送信...", 'warn');
});
