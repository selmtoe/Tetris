<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris Video Analyzer (Beam Search)</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
<style>
    :root {
        --bg-color: #1a1a2e; --primary-color: #4b4b7c; --primary-hover-color: #6a6aff;
        --font-color: #e0e0e0; --canvas-bg-color: #0f0f18;
    }
    body {
        background-color: var(--bg-color); color: var(--font-color);
        font-family: 'Noto Sans JP', sans-serif; display: flex; flex-direction: column;
        align-items: center; padding: 20px; margin: 0;
    }
    .panel {
        background-color: rgba(15, 15, 24, 0.8); border: 2px solid var(--primary-color);
        border-radius: 10px; padding: 20px; width: 100%; max-width: 900px; margin-bottom: 20px;
    }
    h2 { font-family: 'Orbitron', sans-serif; color: var(--primary-hover-color); margin-top: 0; border-bottom: 1px solid var(--primary-color); padding-bottom: 5px;}
    button {
        background-color: var(--primary-color); color: white; border: none;
        padding: 10px 15px; border-radius: 5px; cursor: pointer; font-family: 'Orbitron', sans-serif;
        font-size: 14px; margin-right: 10px; transition: 0.2s;
    }
    button:hover { background-color: var(--primary-hover-color); }
    button:disabled { background-color: #333; cursor: not-allowed; }
    input[type="file"] { margin-bottom: 15px; }
    
    .layout-grid { display: flex; gap: 20px; }
    .layout-col { flex: 1; }
    
    #video-preview { max-width: 100%; border: 1px solid var(--primary-color); background: #000; border-radius: 5px; }
    canvas.board-preview { background-color: var(--canvas-bg-color); border: 1px solid #444; }
    
    #log-area {
        width: 100%; height: 150px; background: #000; color: #0f0;
        font-family: monospace; font-size: 12px; padding: 10px; box-sizing: border-box;
        overflow-y: auto; border: 1px solid #333; margin-top: 10px; border-radius: 5px;
    }
    #result-link-area { display: none; margin-top: 15px; padding: 15px; background: rgba(0, 255, 0, 0.1); border: 1px solid #0f0; border-radius: 5px; }
    #result-link { width: 100%; padding: 10px; box-sizing: border-box; background: #222; color: #fff; border: 1px solid #555; margin-top: 10px;}
</style>
</head>
<body>

<div class="panel">
    <h2>1. Upload Video & Config</h2>
    <input type="file" id="video-upload" accept="video/mp4,video/webm,video/*">
    <div style="margin-bottom: 15px;">
        <label>ビーム幅 (探索の広さ): <input type="number" id="beam-width" value="15" style="width: 60px; background: #333; color: white; border: 1px solid #555;"></label>
    </div>
    <div>
        <button id="btn-load-model">AIモデル読み込み</button>
        <button id="btn-start-scan" disabled>解析スタート</button>
    </div>
</div>

<div class="panel layout-grid">
    <div class="layout-col">
        <h2>Video Analysis</h2>
        <video id="video-preview" muted controls></video>
        <div id="log-area">Ready.</div>
    </div>
    <div class="layout-col" style="max-width: 200px;">
        <h2>Current Best</h2>
        <canvas id="board-canvas" class="board-preview" width="100" height="200"></canvas>
    </div>
</div>

<div class="panel" id="result-link-area">
    <h2 style="color: #44ff44; border-color: #44ff44;">Analysis Complete!</h2>
    <p>エディタ用のリンクが生成されました。コピーして開いてください。</p>
    <textarea id="result-link" rows="3" readonly></textarea>
    <button onclick="document.getElementById('result-link').select(); document.execCommand('copy');">コピー</button>
    <button onclick="window.open(document.getElementById('result-link').value, '_blank');">エディタを開く</button>
</div>

<script>
// ==========================================
// 1. Core Logic & Definitions (エディタ互換)
// ==========================================
const BOARD_WIDTH = 10;
const BOARD_HEIGHT = 40;
const VISIBLE_HEIGHT = 20;

// ミノの相対座標定義 (中心からの相対座標)
const TETROMINOS = {
    'I': { shape: [[0, 0], [1, 0], [2, 0], [3, 0]], center: [1.5, 0.5] },
    'O': { shape: [[0, 0], [1, 0], [0, -1], [1, -1]], center: [0.5, -0.5] },
    'T': { shape: [[0, 0], [-1, 0], [0, -1], [1, 0]], center: [0, 0] },
    'L': { shape: [[-1, 0], [0, 0], [1, 0], [1, -1]], center: [0, 0] },
    'J': { shape: [[0, 0], [-1, 0], [1, 0], [-1, -1]], center: [0, 0] },
    'S': { shape: [[1, -1], [-1, 0], [0, 0], [0, -1]], center: [0, 0] },
    'Z': { shape: [[0, 0], [1, 0], [0, -1], [-1, -1]], center: [0, 0] }
};
const COLORS = { 'I': '#00f0f0', 'O': '#f0f000', 'T': '#a000f0', 'L': '#f0a000', 'J': '#0000f0', 'S': '#00f000', 'Z': '#f00000', 'G': '#999999' };

function getRotatedShape(type, rot) {
    if(!type || !TETROMINOS[type]) return [];
    const o = TETROMINOS[type].shape;
    if(rot === 0 || type === 'O') return o;
    const c = TETROMINOS[type].center;
    return o.map(b => {
        let [x, y] = [b[0] - c[0], b[1] - c[1]];
        for(let i=0; i<rot; i++){ [x, y] = [-y, x]; }
        return [x + c[0] + (type==='O'?0.5:0), y + c[1] + (type==='O'?0.5:0)];
    });
}

function cloneBoard(board) {
    return board.map(row => [...row]);
}

function createEmptyBoard() {
    return Array.from({ length: BOARD_HEIGHT }, () => Array(BOARD_WIDTH).fill(null));
}

function checkCollision(board, type, x, y, rot) {
    const shape = getRotatedShape(type, rot);
    for (const b of shape) {
        const bx = Math.floor(x + b[0]);
        const by = Math.floor(y + b[1]);
        if (bx < 0 || bx >= BOARD_WIDTH || by >= BOARD_HEIGHT || (by >= 0 && board[by] && board[by][bx])) {
            return true; // 衝突
        }
    }
    return false;
}

function clearLines(board) {
    let cleared = 0;
    const newBoard = board.filter(row => {
        if (row.every(cell => cell !== null)) { cleared++; return false; }
        return true;
    });
    for (let i = 0; i < cleared; i++) {
        newBoard.unshift(Array(BOARD_WIDTH).fill(null));
    }
    return { board: newBoard, cleared };
}

function placeMino(board, type, x, y, rot) {
    const newBoard = cloneBoard(board);
    const shape = getRotatedShape(type, rot);
    for (const b of shape) {
        const bx = Math.floor(x + b[0]);
        const by = Math.floor(y + b[1]);
        if (by >= 0 && by < BOARD_HEIGHT) {
            newBoard[by][bx] = type;
        }
    }
    return newBoard;
}

// ==========================================
// 2. Vision Library (ONNX & 色認識のラッパー)
// ==========================================
const TetrisVision = (() => {
    let session = null;
    const CLASS_NAMES = ['null', 'G', 'S', 'Z', 'L', 'J', 'O', 'I', 'T'];
    const SCAN_COLOR_PALETTE = {
        'NULL': [{r:0,g:0,b:0}, {r:48,g:40,b:56}], 'G': [{r:153,g:153,b:153}, {r:216,g:216,b:216}],
        'I': [{r:1,g:152,b:153}, {r:1,g:153,b:213}], 'O': [{r:153,g:154,b:2}, {r:249,g:185,b:0}],
        'T': [{r:152,g:0,b:153}, {r:135,g:30,b:136}], 'L': [{r:153,g:103,b:0}, {r:245,g:97,b:0}],
        'J': [{r:0,g:0,b:187}, {r:0,g:75,b:165}], 'S': [{r:16,g:151,b:31}, {r:92,g:181,b:35}],
        'Z': [{r:153,g:0,b:0}, {r:218,g:24,b:34}]
    };

    async function init() {
        ort.env.logLevel = 'fatal';
        session = await ort.InferenceSession.create('./Load%20PPT/tetris.onnx', { executionProviders: ['wasm'] });
    }

    function findClosestColor(r, g, b, excludeEmptyAndGarbage = false) {
        let minD = Infinity, best = null;
        for (const key in SCAN_COLOR_PALETTE) {
            if (excludeEmptyAndGarbage && (key === 'NULL' || key === 'G')) continue;
            for (const tc of SCAN_COLOR_PALETTE[key]) {
                const d = (r-tc.r)**2 + (g-tc.g)**2 + (b-tc.b)**2;
                if (d < minD) { minD = d; best = key; }
            }
        }
        if(!excludeEmptyAndGarbage && minD > 25000) return null;
        return best === 'NULL' ? null : best;
    }

    function getAverageColor(imgData, rad) {
        let tr=0, tg=0, tb=0, c=0;
        const d = Math.ceil(rad*2);
        for(let y=0; y<d; y++) {
            for(let x=0; x<d; x++) {
                if((x-rad)**2+(y-rad)**2 <= rad*rad) {
                    const i=(y*imgData.width+x)*4;
                    // 黒背景のノイズ除去
                    if(imgData.data[i]>50 || imgData.data[i+1]>50 || imgData.data[i+2]>50) {
                        tr+=imgData.data[i]; tg+=imgData.data[i+1]; tb+=imgData.data[i+2]; c++;
                    }
                }
            }
        }
        return c ? {r:tr/c, g:tg/c, b:tb/c} : {r:0,g:0,b:0};
    }

    function extractFeatures(imgD, w, h) {
        const numP = w * h; const feats = [];
        const bCh = new Float32Array(numP), gCh = new Float32Array(numP), rCh = new Float32Array(numP);
        const hCh = new Float32Array(numP), sCh = new Float32Array(numP), vCh = new Float32Array(numP);
        for (let i=0; i<numP; i++) {
            const r=imgD.data[i*4], g=imgD.data[i*4+1], b=imgD.data[i*4+2];
            bCh[i]=b; gCh[i]=g; rCh[i]=r;
            const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
            vCh[i] = max; sCh[i] = max? (d/max)*255 : 0;
            let hv = 0;
            if(max!==min){
                if(max===r) hv = (60*(g-b)/d+360)%360;
                else if(max===g) hv = (60*(b-r)/d+120)%360;
                else hv = (60*(r-g)/d+240)%360;
            }
            hCh[i] = hv/2;
        }
        const getStats = arr => {
            let sum=0; for(let v of arr) sum+=v;
            const mean = sum/arr.length;
            let sq=0; for(let v of arr) sq+=(v-mean)**2;
            return [mean, Math.sqrt(sq/arr.length)];
        };
        feats.push(...getStats(bCh), ...getStats(gCh), ...getStats(rCh), ...getStats(hCh), ...getStats(sCh), ...getStats(vCh));
        
        const sx=w/4, sy=h/4;
        for(let ty=0; ty<4; ty++){
            for(let tx=0; tx<4; tx++){
                let sb=0, sg=0, sr=0, c=0;
                for(let py=Math.floor(ty*sy); py<Math.floor((ty+1)*sy); py++){
                    for(let px=Math.floor(tx*sx); px<Math.floor((tx+1)*sx); px++){
                        const idx = py*w+px; sb+=bCh[idx]; sg+=gCh[idx]; sr+=rCh[idx]; c++;
                    }
                }
                if(c) feats.push(sb/c, sg/c, sr/c); else feats.push(0,0,0);
            }
        }
        let cb=0, cg=0, cr=0, cc=0;
        const cx=Math.floor(w/2), cy=Math.floor(h/2), cw=Math.floor(w/4), ch=Math.floor(h/4);
        for(let py=cy-ch; py<cy+ch; py++){
            for(let px=cx-cw; px<cx+cw; px++){
                const idx = py*w+px; cb+=bCh[idx]; cg+=gCh[idx]; cr+=rCh[idx]; cc++;
            }
        }
        if(cc) feats.push(cb/cc, cg/cc, cr/cc); else feats.push(0,0,0);
        return new Float32Array(feats);
    }

    // P1固定で解析
    async function analyzeFrame(canvas1080p) {
        const ctx = canvas1080p.getContext('2d');
        const boardRect = { x: 304, y: 157, w: 366, h: 725 };
        const nextCoords = [ {x:160, y:155}, {x:500, y:122}, {x:500, y:175}, {x:500, y:225}, {x:500, y:275}, {x:500, y:325} ];
        
        const cellW = boardRect.w / 10, cellH = boardRect.h / 20;
        
        // 1. Next/Hold Lightweight Extraction
        const nextQueue = [];
        let holdMino = null;
        const radius = 5;
        for (let i = 0; i < nextCoords.length; i++) {
            const coord = nextCoords[i];
            const imgD = ctx.getImageData(coord.x - radius, coord.y - radius, radius*2, radius*2);
            const avg = getAverageColor(imgD, radius);
            const isBlack = (avg.r < 50 && avg.g < 50 && avg.b < 50);
            
            if (i === 0) {
                if (!isBlack) holdMino = findClosestColor(avg.r, avg.g, avg.b, true);
            } else {
                if (i === 1 && isBlack) break; // Nextが尽きている
                const m = findClosestColor(avg.r, avg.g, avg.b, true);
                if (m) nextQueue.push(m);
            }
        }

        // 2. ONNX Board Extraction (Only needed if triggered, but for simplicity we can do it on demand)
        const getBoard = async () => {
            const boardImgData = ctx.getImageData(boardRect.x, boardRect.y, boardRect.w, boardRect.h);
            const batchFeatures = [];
            for (let r=0; r<20; r++) {
                for (let c=0; c<10; c++) {
                    const iw = Math.floor(cellW), ih = Math.floor(cellH);
                    const ix = Math.floor(c * cellW), iy = Math.floor(r * cellH);
                    const cellData = new Uint8ClampedArray(iw * ih * 4);
                    for(let row=0; row<ih; row++){
                        const s = ((iy+row)*boardImgData.width + ix)*4;
                        cellData.set(boardImgData.data.subarray(s, s + iw*4), row*iw*4);
                    }
                    batchFeatures.push(extractFeatures({data: cellData, width: iw, height: ih}, iw, ih));
                }
            }
            const flat = new Float32Array(200 * 63);
            for(let i=0; i<200; i++) flat.set(batchFeatures[i], i*63);
            const tensor = new ort.Tensor('float32', flat, [200, 63]);
            const res = await session.run({ [session.inputNames[0]]: tensor });
            const labels = res[session.outputNames[0]].data;
            
            const board = Array.from({ length: 40 }, () => Array(10).fill(null));
            for(let i=0; i<200; i++){
                const l = CLASS_NAMES[Number(labels[i])];
                board[20 + Math.floor(i/10)][i%10] = (l === 'null') ? null : l;
            }
            // Garbage cleanup
            let firstNonG = -1;
            for(let y=39; y>=0; y--) { if(!board[y].includes('G')) { firstNonG = y; break; } }
            if(firstNonG !== -1) {
                for(let y=firstNonG-1; y>=0; y--) {
                    for(let x=0; x<10; x++) if(board[y][x]==='G') board[y][x] = null;
                }
            }
            return board;
        };

        return { nextQueue, holdMino, getBoard };
    }

    return { init, analyzeFrame };
})();

// ==========================================
// 3. Beam Search Logic
// ==========================================
const BeamSearch = (() => {
    
    function compareBoards(generated, observed) {
        let score = 0;
        // 20行目〜39行目を比較
        for (let y = 20; y < 40; y++) {
            for (let x = 0; x < 10; x++) {
                const g = generated[y][x];
                const o = observed[y][x];
                if (g === o && g !== null) score += 10; // 正確な一致は高得点
                else if (g === null && o !== null) score -= 5; // 見逃し
                else if (g !== null && o === null) score -= 1; // エフェクトで消えてる可能性があるのでペナルティ低め
                else if (g !== null && o !== null && g !== o) score -= 8; // 色違い
            }
        }
        return score;
    }

    // 緩い合法手生成 (壁被りなし ＆ 接地している)
    function generateLegalPlacements(board, pieceType) {
        const placements = [];
        for (let rot = 0; rot < 4; rot++) {
            if (pieceType === 'O' && rot > 0) continue;
            for (let x = -2; x < 12; x++) {
                // yを上から探す
                for (let y = 0; y < 40; y++) {
                    if (!checkCollision(board, pieceType, x, y, rot)) {
                        // この位置が有効で、1つ下が衝突するなら接地している
                        if (checkCollision(board, pieceType, x, y + 1, rot)) {
                            placements.push({ type: pieceType, x, y, rot });
                        }
                    }
                }
            }
        }
        return placements;
    }

    async function processStep(beamStates, observation, beamWidth = 15) {
        let nextStates = [];
        const observedBoard = await observation.getBoard();

        for (const state of beamStates) {
            const availablePieces = [];
            // 次の操作ミノの候補 (Nextの先頭 or Hold)
            if (state.next.length > 0) availablePieces.push({ useHold: false, piece: state.next[0] });
            if (state.hold) availablePieces.push({ useHold: true, piece: state.hold });
            else if(state.next.length > 0) availablePieces.push({ useHold: true, piece: state.next[0] }); // 初回Hold

            for (const { useHold, piece } of availablePieces) {
                const placements = generateLegalPlacements(state.board, piece);
                
                for (const p of placements) {
                    const tempBoard = placeMino(state.board, p.type, p.x, p.y, p.rot);
                    const { board: newBoard } = clearLines(tempBoard); // シンプルに消去のみ

                    const score = state.score + compareBoards(newBoard, observedBoard);
                    
                    // 新しい状態の更新
                    let newHold = state.hold;
                    let newNext = [...state.next];
                    if (useHold) {
                        if (!state.hold) {
                            newHold = newNext.shift();
                        } else {
                            // Holdを使った場合は、現在のNext先頭がHoldにいくわけではなく、
                            // 今降ってきたミノがHoldに行く。※簡易化のため、ここでは「使った」事実だけ記録。
                            // 正確には動画の観測Next/Holdを信じるため、ここでは状態のHistory更新のみに注力。
                        }
                    } else {
                        newNext.shift();
                    }

                    // 強制的に観測されたNext/Holdを正として上書き(ズレ補正)
                    newHold = observation.holdMino;
                    newNext = observation.nextQueue;

                    nextStates.push({
                        board: newBoard,
                        hold: newHold,
                        next: newNext,
                        score: score,
                        history: [...state.history, { board: newBoard, hold: newHold, next: newNext }]
                    });
                }
            }
        }

        // スコア順にソートして上位W個を残す
        nextStates.sort((a, b) => b.score - a.score);
        
        // 重複状態の排除（同じ盤面があれば弾く）
        const uniqueStates = [];
        const seen = new Set();
        for(const s of nextStates) {
            const hash = s.board.map(r=>r.map(c=>c||'_').join('')).join('');
            if(!seen.has(hash)) {
                seen.add(hash);
                uniqueStates.push(s);
                if(uniqueStates.length >= beamWidth) break;
            }
        }

        return uniqueStates.length > 0 ? uniqueStates : beamStates; // 見つからなければ前回の状態を維持
    }

    return { processStep };
})();

// ==========================================
// 4. Main App Controller
// ==========================================
const App = (() => {
    let video = document.getElementById('video-preview');
    let logArea = document.getElementById('log-area');
    let previewCanvas = document.getElementById('board-canvas');
    let ctx = previewCanvas.getContext('2d');
    
    let isModelLoaded = false;
    let beamWidth = 15;
    let framesData = []; // トリガーされたフレーム情報の保存先

    function log(msg) {
        logArea.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        logArea.scrollTop = logArea.scrollHeight;
    }

    function drawPreview(board) {
        ctx.fillStyle = '#0f0f18';
        ctx.fillRect(0, 0, 100, 200);
        for(let y=20; y<40; y++){
            for(let x=0; x<10; x++){
                if(board[y][x]) {
                    ctx.fillStyle = COLORS[board[y][x]];
                    ctx.fillRect(x*10, (y-20)*10, 10, 10);
                }
                ctx.strokeStyle = '#333'; ctx.strokeRect(x*10, (y-20)*10, 10, 10);
            }
        }
    }

    async function startExtraction() {
        log("1. フレーム抽出を開始します...");
        framesData = [];
        video.currentTime = 0;
        let prevNextStr = "";
        let prevHoldStr = "";
        
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = 1920; tempCanvas.height = 1080;
        const tCtx = tempCanvas.getContext('2d');

        return new Promise((resolve) => {
            const processFrame = async () => {
                if (video.ended || video.currentTime >= video.duration) {
                    log("動画読み込み完了。抽出フレーム数: " + framesData.length);
                    resolve();
                    return;
                }

                // Aspect ratio fix and draw
                const srcAspect = video.videoWidth / video.videoHeight;
                let cropW = video.videoWidth, cropH = video.videoHeight, cropX = 0, cropY = 0;
                if(srcAspect > 16/9) { cropW = cropH * 16/9; cropX = (video.videoWidth - cropW)/2; }
                else { cropH = cropW / (16/9); cropY = (video.videoHeight - cropH)/2; }
                tCtx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, 1920, 1080);

                // 軽量スキャン
                const analysis = await TetrisVision.analyzeFrame(tempCanvas);
                const currNextStr = analysis.nextQueue.join('');
                const currHoldStr = analysis.holdMino || '';

                // トリガー判定：Nextが2箇所以上変わった、またはHoldが切り替わった
                let diffCount = 0;
                for(let i=0; i<Math.min(prevNextStr.length, currNextStr.length); i++){
                    if(prevNextStr[i] !== currNextStr[i]) diffCount++;
                }

                if ((currNextStr !== "" && diffCount >= 2) || (currHoldStr !== prevHoldStr)) {
                    log(`[${video.currentTime.toFixed(2)}s] ミノ設置を検知！ (Diff: ${diffCount})`);
                    framesData.push(analysis);
                    prevNextStr = currNextStr;
                    prevHoldStr = currHoldStr;
                } else if (prevNextStr === "") {
                    // 最初の認識
                    prevNextStr = currNextStr;
                    prevHoldStr = currHoldStr;
                }

                // フレームを進める (100msずつ進める)
                video.currentTime += 0.1;
            };

            video.addEventListener('seeked', processFrame);
            video.currentTime = 0; // Trigger first seek
        });
    }

    async function runBeamSearch() {
        log("2. ビームサーチを開始します...");
        // 初期状態 (空の盤面とする。実用上はユーザーに入力させるUIが必要)
        let states = [{
            board: createEmptyBoard(),
            hold: '',
            next: framesData.length > 0 ? framesData[0].nextQueue : [],
            score: 0,
            history: [] // {board, hold, next}
        }];

        for (let i = 0; i < framesData.length; i++) {
            log(`探索中... Step ${i+1}/${framesData.length}`);
            states = await BeamSearch.processStep(states, framesData[i], beamWidth);
            drawPreview(states[0].board);
        }

        log("探索完了！");
        return states[0]; // Best state
    }

    function generateEditorLink(bestState) {
        // エディタの fumenPages フォーマットへ変換
        // v2形式 (差分なしで単純化して格納)
        const pages = [];
        
        // EncodeRLEヘルパー
        function encodeRLE(dataArr) {
            const rle = [];
            let lastValue = dataArr[0]; let count = 1;
            for (let i = 1; i < dataArr.length; i++) {
                if (dataArr[i] === lastValue) count++;
                else { rle.push([lastValue, count]); lastValue = dataArr[i]; count = 1; }
            }
            rle.push([lastValue, count]);
            return rle;
        }

        let prevBoard1D = null;

        for (const step of bestState.history) {
            const board1D = step.board.map(row => row.map(c => c === null ? '_' : c).join('')).join('').split('');
            let bData;
            if (!prevBoard1D) {
                bData = encodeRLE(board1D);
            } else {
                const diff = board1D.map((c, i) => c === prevBoard1D[i] ? 'E' : c);
                bData = encodeRLE(diff);
            }
            prevBoard1D = board1D;

            pages.push({
                p1: {
                    b: bData,
                    n: step.next.join(''),
                    h: step.hold || ''
                }
            });
        }

        const exportData = { v: 'f2', m: '1P', p: pages };
        const jsonStr = JSON.stringify(exportData);
        const b64 = btoa(String.fromCharCode.apply(null, new TextEncoder().encode(jsonStr)));
        
        // 同じ階層のエディタへリンク
        const link = window.location.href.replace(/[^/]*$/, '') + 'editor.html#' + b64;
        document.getElementById('result-link-area').style.display = 'block';
        document.getElementById('result-link').value = link;
        log("リンクを生成しました。");
    }

    return {
        init: () => {
            document.getElementById('video-upload').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    video.src = URL.createObjectURL(file);
                    log("動画を読み込みました。");
                }
            });

            document.getElementById('btn-load-model').addEventListener('click', async () => {
                log("ONNXモデルをロード中...");
                document.getElementById('btn-load-model').disabled = true;
                await TetrisVision.init();
                isModelLoaded = true;
                log("ONNXモデル ロード完了。");
                document.getElementById('btn-start-scan').disabled = false;
            });

            document.getElementById('btn-start-scan').addEventListener('click', async () => {
                document.getElementById('btn-start-scan').disabled = true;
                beamWidth = parseInt(document.getElementById('beam-width').value) || 15;
                
                await startExtraction();
                if(framesData.length > 0) {
                    const bestState = await runBeamSearch();
                    generateEditorLink(bestState);
                } else {
                    log("有効なフレームが抽出されませんでした。");
                }
                document.getElementById('btn-start-scan').disabled = false;
            });
        }
    };
})();

window.addEventListener('DOMContentLoaded', App.init);

</script>
